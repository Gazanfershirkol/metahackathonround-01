name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        uses: huggingface/action-push-to-hub@main
        with:
          repo_url: https://huggingface.co/spaces/Gazanfer21/Support-Ticket-Triage
          repo_type: space
          token: ${{ secrets.HF_TOKEN }}
